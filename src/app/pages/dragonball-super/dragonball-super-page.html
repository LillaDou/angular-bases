<h1>DragonBall Page</h1>

<hr>

<section class="row">
    <div class="col-12 col-sm-6">

        <dragonball-character-add
            (newCharacter)="addCharacter($event)"/>
        <!-- El $event es el valo del evento emitido -->
        
    </div>

    <div class="col-12 col-sm-6">

        <dragonball-character-list
            listName="Listado de personajes"
            [characters]="characters()"/>
        <!-- El componente padre del character-list es el dragonball-super-page. 
         Por ello, mandamos y asignamos la señal de characters() al input.required del character-list-->

    </div>

</section>

<!-- ! Los paréntesis como el (newCharacter) sirven para emitir eventos
 ! Los corchetes como el [characters] sirven para asignar atributos
 ! Las señales como listName sirven para cambiar el estado-->
